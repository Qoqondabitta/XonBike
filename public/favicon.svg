<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#0a0a0a"/>
  <!-- Wheels -->
  <circle cx="8" cy="22" r="5.5" fill="none" stroke="#22c55e" stroke-width="2.5"/>
  <circle cx="24" cy="22" r="5.5" fill="none" stroke="#22c55e" stroke-width="2.5"/>
  <!-- Main frame: bottom bracket to both wheels -->
  <path d="M8 22 L13 11 L24 22" fill="none" stroke="#22c55e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Seat stay -->
  <line x1="13" y1="22" x2="14.5" y2="11" stroke="#22c55e" stroke-width="2" stroke-linecap="round"/>
  <!-- Seat -->
  <line x1="11" y1="11" x2="17" y2="11" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
  <!-- Handlebar stem and grip -->
  <path d="M17 11 L19.5 9 L21.5 9" fill="none" stroke="#22c55e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Hub -->
  <circle cx="16" cy="17" r="1.6" fill="#22c55e"/>
</svg>
